<h1>Vita Mahjong Number</h1>
<div id="levelBadge">Level 1 — Beginner</div>

<div class="row">

<!-- Level-complete / game-over overlay -->

  <div class="ov-box">
    <div class="ov-title" id="ovTitle"></div>
    <div class="ov-sub"   id="ovSub"></div>
    <div class="ov-detail" id="ovDetail"></div>
    <button class="ov-btn" id="ovBtn" onclick="onOverlayBtn()">Next Level ▶</button>
  </div>
</div>

<script>
// ─────────────────────────────────────────────────
// 1. Position encoding  (mirrors TilePosition.cs)
// ─────────────────────────────────────────────────
function enc(x,y,z){ return (x&31)|((y&31)<<5)|((z&7)<<10); }
function dec(p){ return {x:p&31, y:(p>>5)&31, z:(p>>10)&7}; }
function isFree(x,y,z,occ){
  if(occ.has(enc(x,y,z+1)))return false;
  return !occ.has(enc(x-1,y,z))||!occ.has(enc(x+1,y,z));
}
function affectedNeighbors(x,y,z){
  const r=[enc(x-1,y,z),enc(x+1,y,z)];
  if(z>0){r.push(enc(x,y,z-1),enc(x-1,y,z-1),enc(x+1,y,z-1));}
  return r;
}

// ─────────────────────────────────────────────────
// 2. PRNG — Mulberry32 (seeded, deterministic)
// ─────────────────────────────────────────────────
function makeRng(seed){
  let s=seed>>>0;
  return ()=>{
    s=(s+0x6D2B79F5)>>>0;
    let t=Math.imul(s^(s>>>15),1|s);
    t=(t+Math.imul(t^(t>>>7),61|t))^t;
    return((t^(t>>>14))>>>0)/4294967296;
  };
}
function shuffle(a,rng){
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(rng()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
}

// ─────────────────────────────────────────────────
// 3. Tile pools
// ─────────────────────────────────────────────────
function classicPool(ppv){
  const p=[];
  for(let v=1;v<=9;v++) for(let i=0;i<ppv*2;i++) p.push(v);
  return p;
}
function mathPool36(){
  const p=[];
  for(let v=1;v<=9;v++) for(let i=0;i<4;i++) p.push(v);
  return p;
}
function mathPool144(){
  const p=[];
  for(let v=1;v<=9;v++) for(let i=0;i<16;i++) p.push(v);
  return p;
}

// ─────────────────────────────────────────────────
// 4. Layout templates
// ─────────────────────────────────────────────────
function small36(){
  const s=[];
  for(let y=0;y<5;y++) for(let x=0;x<4;x++) s.push(enc(x,y,0));
  for(let y=0;y<4;y++) for(let x=0;x<3;x++) s.push(enc(x,y,1));
  for(let y=0;y<2;y++) for(let x=0;x<2;x++) s.push(enc(x,y,2));
  return s; // 20+12+4 = 36
}
function standard144(){
  const s=[],seen=new Set();
  const add=(x,y,z)=>{ const p=enc(x,y,z); if(!seen.has(p)){seen.add(p);s.push(p);} };
  for(let y=0;y<5;y++) for(let x=0;x<12;x++) add(x,y,0); // 60
  for(let y=0;y<4;y++) for(let x=1;x<=10;x++) add(x,y,1); // 40
  for(let y=0;y<4;y++) for(let x=2;x<=9;x++)  add(x,y,2); // 32
  for(let y=0;y<4;y++) for(let x=3;x<=5;x++)  add(x,y,3); // 12 → total 144
  return s;
}

// ─────────────────────────────────────────────────
// 5. Board Generator  (JS port of fixed BoardGenerator.cs)
// ─────────────────────────────────────────────────
function blockScore(pos,occ,free){
  const{x,y,z}=dec(pos);
  occ.add(pos);
  const nb=affectedNeighbors(x,y,z);
  let sc=0;
  for(const n of nb){
    if(!free.has(n))continue;
    const d=dec(n);
    if(!isFree(d.x,d.y,d.z,occ))sc++;
  }
  occ.delete(pos);
  return sc;
}
// pairSafe: returns false if placing both ai AND aj would leave either tile
// blocked at removal time. At removal, the partner is still on the board, so
// we must verify isFree(ai, occ∪{aj}) and isFree(aj, occ∪{ai}).
// Since both ai and aj are already in `free` (so their tops are clear and
// at least one side is open w.r.t. current occ), the only failure cases are:
//   • partner is directly above  → blocks the top
//   • partner is left/right AND the opposite side is already occupied
function pairSafe(ai,aj,occ){
  const di=dec(ai),dj=dec(aj);
  // does aj block ai?
  if(enc(di.x,di.y,di.z+1)===aj)return false;
  if(enc(di.x-1,di.y,di.z)===aj&&occ.has(enc(di.x+1,di.y,di.z)))return false;
  if(enc(di.x+1,di.y,di.z)===aj&&occ.has(enc(di.x-1,di.y,di.z)))return false;
  // does ai block aj?
  if(enc(dj.x,dj.y,dj.z+1)===ai)return false;
  if(enc(dj.x-1,dj.y,dj.z)===ai&&occ.has(enc(dj.x+1,dj.y,dj.z)))return false;
  if(enc(dj.x+1,dj.y,dj.z)===ai&&occ.has(enc(dj.x-1,dj.y,dj.z)))return false;
  return true;
}
function selectPair(free,occ,rng){
  const arr=[...free];
  shuffle(arr,rng);                    // different spatial sequence each retry
  arr.sort((a,b)=>dec(a).z-dec(b).z); // prefer lower z-layers (stable within shuffle)
  if(arr.length<2)return[-1,-1];
  const cap=Math.min(arr.length,50); // limit O(N²) for 144-tile boards
  let bA=-1,bB=-1,bSc=Infinity;
  for(let i=0;i<cap;i++){
    const si=blockScore(arr[i],occ,free);
    for(let j=i+1;j<cap;j++){
      if(!pairSafe(arr[i],arr[j],occ))continue; // skip mutually-blocking pairs
      const sc=si+blockScore(arr[j],occ,free);
      if(sc<bSc){bSc=sc;bA=arr[i];bB=arr[j];}
    }
  }
  return[bA,bB];
}
function swapRm(arr,i){ arr[i]=arr[arr.length-1]; arr.pop(); }
function swapRmPair(arr,a,b){ const h=Math.max(a,b),l=Math.min(a,b); swapRm(arr,h); swapRm(arr,l); }
function findComp(pool,mode,vA,skip){
  for(let i=0;i<pool.length;i++){
    if(i===skip)continue;
    if(mode==='classic'?pool[i]===vA:pool[i]+vA===10)return i;
  }
  return -1;
}
function placeTile(pos,val,occ,free,lset,board){
  free.delete(pos); occ.add(pos); board.set(pos,val);
  const{x,y,z}=dec(pos);
  const nb=affectedNeighbors(x,y,z);
  nb.push(enc(x,y,z+1)); // FIX 3 — evaluate z+1 neighbour
  for(const n of nb){
    if(!lset.has(n)||occ.has(n))continue; // FIX 2 — evaluate unoccupied too
    const d=dec(n);
    if(isFree(d.x,d.y,d.z,occ)) free.add(n); else free.delete(n);
  }
}
function tryGen(slots,pool,mode,rng){
  const lset=new Set(slots);
  const occ=new Set(), free=new Set(slots); // FIX 1 — seed ALL positions
  const wp=[...pool]; shuffle(wp,rng);
  const board=new Map(), order=[];
  while(wp.length>=2){
    if(free.size<2)return null;
    const[sA,sB]=selectPair(free,occ,rng);
    if(sA<0||sA===sB)return null;
    const vA=wp[0], iB=findComp(wp,mode,vA,0);
    if(iB<0)return null;
    const vB=wp[iB];
    swapRmPair(wp,0,iB);
    order.push([sA,sB]);
    placeTile(sA,vA,occ,free,lset,board);
    placeTile(sB,vB,occ,free,lset,board);
  }
  if(board.size!==slots.length)return null;
  return{board, solution:[...order].reverse()};
}
function generate(slots,pool,mode,seed,tries){
  const rng=makeRng(seed);
  for(let i=0;i<tries;i++){
    const r=tryGen(slots,[...pool],mode,rng);
    if(r)return r;
  }
  return null;
}

// ─────────────────────────────────────────────────
// 6. Solution validator  (O(N) — 100% accurate)
// ─────────────────────────────────────────────────
function verifySolution(board,solution,mode){
  const occ=new Set(board.keys());
  for(const[pA,pB]of solution){
    if(!occ.has(pA)||!occ.has(pB))return false;
    const a=dec(pA),b=dec(pB);
    if(!isFree(a.x,a.y,a.z,occ)||!isFree(b.x,b.y,b.z,occ))return false;
    const vA=board.get(pA),vB=board.get(pB);
    if(mode==='classic'?vA!==vB:vA+vB!==10)return false;
    occ.delete(pA); occ.delete(pB);
  }
  return occ.size===0;
}

// ─────────────────────────────────────────────────
// 7. Difficulty level table (15 levels, 5 axes)
//    sz: 'small'=36 tiles | 'large'=144 tiles
//    mode: 'classic' same value | 'math' sum=10
//    hl: 'full' all free | 'partial' matchable only | 'none' hidden
//    sh: shuffles (Infinity=unlimited)
//    t: timer seconds (0=no timer)
// ─────────────────────────────────────────────────
const LEVELS=[
  {sz:'small',mode:'classic',hl:'full',   sh:Infinity,t:0,   seed:42,    label:'Beginner'},
  {sz:'small',mode:'classic',hl:'full',   sh:Infinity,t:0,   seed:137,   label:'Beginner'},
  {sz:'small',mode:'classic',hl:'full',   sh:Infinity,t:0,   seed:256,   label:'Easy'},
  {sz:'small',mode:'math',   hl:'full',   sh:Infinity,t:0,   seed:512,   label:'Easy'},
  {sz:'small',mode:'math',   hl:'full',   sh:Infinity,t:0,   seed:777,   label:'Medium'},
  {sz:'large',mode:'math',   hl:'full',   sh:3,        t:0,   seed:1024,  label:'Medium'},
  {sz:'large',mode:'math',   hl:'partial',sh:3,        t:0,   seed:2048,  label:'Hard'},
  {sz:'large',mode:'math',   hl:'partial',sh:2,        t:0,   seed:3141,  label:'Hard'},
  {sz:'large',mode:'math',   hl:'partial',sh:2,        t:600, seed:4096,  label:'Expert'},
  {sz:'large',mode:'math',   hl:'partial',sh:1,        t:540, seed:5000,  label:'Expert'},
  {sz:'large',mode:'math',   hl:'none',   sh:1,        t:480, seed:6666,  label:'Master'},
  {sz:'large',mode:'math',   hl:'none',   sh:1,        t:420, seed:7777,  label:'Master'},
  {sz:'large',mode:'math',   hl:'none',   sh:0,        t:360, seed:8888,  label:'Grandmaster'},
  {sz:'large',mode:'math',   hl:'none',   sh:0,        t:300, seed:9999,  label:'Grandmaster'},
  {sz:'large',mode:'math',   hl:'none',   sh:0,        t:240, seed:12345, label:'Legend'},
];

// ─────────────────────────────────────────────────
// 8. Rendering
// ─────────────────────────────────────────────────
const TS=54,ZDX=7,ZDY=9,PAD=22;
const VCOL=[null,
  '#e74c3c','#e67e22','#f1c40f','#2ecc71',
  '#00cec9','#3498db','#a855f7','#e91e63','#fd79a8'
];
function tsp(x,y,z,mxZ){return{sx:PAD+x*TS+z*ZDX,sy:PAD+y*TS-z*ZDY+mxZ*ZDY};}
function rr(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);ctx.closePath();
}
function shade(hex,amt){
  const n=parseInt(hex.replace('#',''),16);
  const r=Math.max(0,Math.min(255,(n>>16)+amt));
  const g=Math.max(0,Math.min(255,((n>>8)&255)+amt));
  const b=Math.max(0,Math.min(255,(n&255)+amt));
  return`rgb(${r},${g},${b})`;
}
function drawTile(ctx,sx,sy,val,st){
  const TW=TS-2,TH=TS-2,BASE=VCOL[val]||'#888';
  ctx.fillStyle=shade(BASE,-50);
  rr(ctx,sx+3,sy+3,TW,TH,7);ctx.fill();
  ctx.fillStyle=st==='blocked'?shade(BASE,-70):st==='sel'?shade(BASE,50):BASE;
  rr(ctx,sx,sy,TW,TH,7);ctx.fill();
  if(st==='sel'){
    ctx.strokeStyle='#ffd700';ctx.lineWidth=2.5;
    rr(ctx,sx,sy,TW,TH,7);ctx.stroke();
  } else if(st==='free'){
    ctx.strokeStyle='rgba(255,255,255,0.35)';ctx.lineWidth=1.2;
    rr(ctx,sx,sy,TW,TH,7);ctx.stroke();
  }
  const alpha=st==='blocked'?0.22:0.95;
  ctx.fillStyle=`rgba(255,255,255,${alpha})`;
  ctx.font=`bold ${st==='blocked'?17:21}px 'Segoe UI',sans-serif`;
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(val,sx+TW/2,sy+TH/2);
}

// ─────────────────────────────────────────────────
// 9. Game state
// ─────────────────────────────────────────────────
const G={
  slots:[],origBoard:new Map(),curBoard:new Map(),
  occ:new Set(),solution:[],sel:null,
  mode:'classic',sz:'small',seed:42,
  verified:false,pairs:0,won:false,noMoves:false,solving:false,
  // Difficulty state
  level:1,
  shufflesLeft:Infinity,
  highlightMode:'full',
  timerHandle:null,
  timeRemaining:0,
  timedOut:false,
  _overlayCallback:null,
};

const cv=document.getElementById('cv');
const ctx=cv.getContext('2d');

function maxXYZ(slots){
  let mx=0,my=0,mz=0;
  for(const p of slots){const d=dec(p);if(d.x>mx)mx=d.x;if(d.y>my)my=d.y;if(d.z>mz)mz=d.z;}
  return{mx,my,mz};
}
function getPool(){
  if(G.sz==='small')return G.mode==='math'?mathPool36():classicPool(2);
  return G.mode==='math'?mathPool144():classicPool(8);
}
function getSlots(){return G.sz==='small'?small36():standard144();}

// ─────────────────────────────────────────────────
// 10. Difficulty helpers
// ─────────────────────────────────────────────────
function fmtTime(s){
  const m=Math.floor(s/60),r=s%60;
  return`${m}:${r.toString().padStart(2,'0')}`;
}

// Partial highlight: returns Set of free tiles that have at least one valid match partner
function matchableTiles(freeSet,board,mode){
  const matchable=new Set();
  const fa=[...freeSet];
  for(let i=0;i<fa.length;i++){
    for(let j=i+1;j<fa.length;j++){
      const vA=board.get(fa[i]),vB=board.get(fa[j]);
      if(mode==='classic'?vA===vB:vA+vB===10){
        matchable.add(fa[i]);
        matchable.add(fa[j]);
      }
    }
  }
  return matchable;
}

// Reviewer fix: never call newGame() from timer — set flag only
function startTimer(seconds){
  clearInterval(G.timerHandle);
  G.timerHandle=null;
  G.timeRemaining=seconds;
  document.getElementById('timerStat').style.display='';
  updateStats();
  G.timerHandle=setInterval(()=>{
    if(G.won||G.timedOut){clearInterval(G.timerHandle);G.timerHandle=null;return;}
    G.timeRemaining=Math.max(0,G.timeRemaining-1);
    updateStats();
    if(G.timeRemaining===0){
      clearInterval(G.timerHandle);G.timerHandle=null;
      G.timedOut=true;
      msg('⏱ Time Up! Game Over.','err');
      render();
    }
  },1000);
}

function syncButtons(){
  document.getElementById('bCl').className=G.mode==='classic'?'on':'';
  document.getElementById('bMa').className=G.mode==='math'?'on':'';
  document.getElementById('bSm').className=G.sz==='small'?'on':'';
  document.getElementById('bLg').className=G.sz==='large'?'on':'';
}

// loadLevel: full reset for a new level
function loadLevel(n){
  const cfg=LEVELS[n-1];
  G.level=n;
  G.sz=cfg.sz;
  G.mode=cfg.mode;
  G.highlightMode=cfg.hl;
  G.shufflesLeft=cfg.sh;
  syncButtons();
  document.getElementById('si').value=cfg.seed;
  newGame();
}

// restartLevel: reset current level (bound to "New Game" button)
function restartLevel(){
  loadLevel(G.level);
}

// showOverlay: level-complete / game-over screen
function showOverlay(title,sub,detail,btnLabel,cb){
  document.getElementById('ovTitle').textContent=title;
  document.getElementById('ovSub').textContent=sub;
  document.getElementById('ovDetail').textContent=detail||'';
  document.getElementById('ovBtn').textContent=btnLabel||'Next Level ▶';
  G._overlayCallback=cb;
  document.getElementById('overlay').classList.add('show');
}
function onOverlayBtn(){
  document.getElementById('overlay').classList.remove('show');
  if(G._overlayCallback)G._overlayCallback();
  G._overlayCallback=null;
}

function levelComplete(){
  clearInterval(G.timerHandle);G.timerHandle=null;
  const cfg=LEVELS[G.level-1];
  const next=G.level+1;
  if(next>LEVELS.length){
    showOverlay(
      '🏆 All 15 Levels Complete!',
      'You\'ve mastered Vita Mahjong Number!',
      'Reverse-generation algorithm: undefeated.',
      'Play Again',
      ()=>loadLevel(1)
    );
    return;
  }
  const ncfg=LEVELS[next-1];
  const changes=[];
  if(ncfg.sz!==cfg.sz)changes.push('Larger board (144 tiles)');
  if(ncfg.mode!==cfg.mode)changes.push('Math Mode unlocked');
  if(ncfg.hl==='partial'&&cfg.hl==='full')changes.push('Hints reduced');
  if(ncfg.hl==='none'&&cfg.hl!=='none')changes.push('Hints removed');
  if(ncfg.sh<cfg.sh&&cfg.sh!==Infinity)changes.push(`Shuffles: ${ncfg.sh}`);
  if(ncfg.sh!==Infinity&&cfg.sh===Infinity)changes.push(`Shuffles: ${ncfg.sh}`);
  if(ncfg.t>0&&cfg.t===0)changes.push('⏱ Timer added');
  else if(ncfg.t<cfg.t&&ncfg.t>0)changes.push(`⏱ Timer: ${fmtTime(ncfg.t)}`);
  showOverlay(
    `Level ${G.level} Complete! 🎉`,
    `Next: Level ${next} — ${ncfg.label}`,
    changes.length?`Incoming: ${changes.join(' · ')}` : '',
    `Level ${next} ▶`,
    ()=>loadLevel(next)
  );
}

// ─────────────────────────────────────────────────
// 11. Mode / layout toggles (manual player controls)
// ─────────────────────────────────────────────────
// Reviewer fix: route through setLayout/setMode so buttons stay in sync
function setMode(m){
  G.mode=m;
  document.getElementById('bCl').className=m==='classic'?'on':'';
  document.getElementById('bMa').className=m==='math'?'on':'';
  newGame();
}
function setLayout(s){
  G.sz=s;
  document.getElementById('bSm').className=s==='small'?'on':'';
  document.getElementById('bLg').className=s==='large'?'on':'';
  newGame();
}
function rndSeed(){
  const s=Math.floor(Math.random()*999999);
  document.getElementById('si').value=s;
  G.seed=s;newGame();
}

// ─────────────────────────────────────────────────
// 12. newGame — regenerate board, keep current level/shuffles
// ─────────────────────────────────────────────────
async function newGame(){
  // Reviewer fix: clear timer first, reset verified early
  clearInterval(G.timerHandle);G.timerHandle=null;
  G.timedOut=false;
  G.verified=false;
  G.solving=false;

  const sv=parseInt(document.getElementById('si').value)||42;
  G.seed=sv;G.sel=null;G.pairs=0;G.won=false;G.noMoves=false;
  msg('Generating board…','warn-c');

  G.slots=getSlots();
  const pool=getPool();
  // selectPair now uses RNG + strict-layer enforcement (no maxCands needed).
  // Each retry explores a genuinely different spatial sequence.
  const tries=G.sz==='small'?80:200;

  // Yield to browser so "Generating…" message renders before heavy work
  await new Promise(r=>setTimeout(r,15));

  // Try configured seed, fall back up to 9 more seeds if needed.
  // Each attempt yields to the event loop so the UI never freezes.
  let result=null, actualSeed=sv;
  for(let attempt=0;attempt<10;attempt++){
    result=generate(G.slots,pool,G.mode,sv+attempt,tries);
    if(result){actualSeed=sv+attempt;break;}
    await new Promise(r=>setTimeout(r,0)); // keep browser responsive
  }

  if(!result){
    msg(`Generation FAILED on seeds ${sv}–${sv+9}. Try a different seed.`,'err');
    document.getElementById('sVer').textContent='✗';
    document.getElementById('sVer').style.color='#ff6b6b';
    return;
  }
  if(actualSeed!==sv) document.getElementById('si').value=actualSeed;

  G.verified=verifySolution(result.board,result.solution,G.mode);
  G.origBoard=new Map(result.board);
  G.curBoard =new Map(result.board);
  G.occ      =new Set(result.board.keys());
  G.solution =result.solution;

  const sv2=document.getElementById('sVer');
  if(G.verified){
    sv2.textContent='✓';sv2.style.color='#1dd1a1';
    msg(`Level ${G.level} ready ✓ — ${result.solution.length} pairs (seed ${sv})`,'ok');
  } else {
    sv2.textContent='✗';sv2.style.color='#ff6b6b';
    msg('⚠ SOLUTION VALIDATION FAILED — algorithm bug!','err');
  }

  // Update difficulty UI
  const cfg=LEVELS[G.level-1]||LEVELS[LEVELS.length-1];
  document.getElementById('levelBadge').textContent=`Level ${G.level} — ${cfg.label}`;
  document.getElementById('sLvl').textContent=G.level;
  document.getElementById('sSh').textContent=G.shufflesLeft===Infinity?'∞':G.shufflesLeft;
  document.getElementById('btnSh').disabled=(G.shufflesLeft===0);

  // Timer
  if(cfg.t>0){
    startTimer(cfg.t);
  } else {
    document.getElementById('timerStat').style.display='none';
    G.timeRemaining=0;
  }

  // Hint tip text
  const htip=cfg.hl==='none'
    ?'<b style="color:#ff6b6b">No hints</b> — free tiles are not highlighted. All difficulty, no safety net.'
    :cfg.hl==='partial'
    ?'<b style="color:#feca57">Partial hints</b> — only tiles with a valid match partner are highlighted.'
    :'Click a <b style="color:#1dd1a1">free tile</b> (bright) to select, then click a matching tile.';
  document.getElementById('tipText').innerHTML=
    htip+' Every board is <b style="color:#ffd700">mathematically guaranteed solvable</b>.';

  resize();render();updateStats();buildLegend();
}

// ─────────────────────────────────────────────────
// 13. Gameplay
// ─────────────────────────────────────────────────
function freeTiles(){
  const f=new Set();
  for(const p of G.occ){const d=dec(p);if(isFree(d.x,d.y,d.z,G.occ))f.add(p);}
  return f;
}
function hasValidPair(){
  const free=[...freeTiles()];
  for(let i=0;i<free.length;i++)for(let j=i+1;j<free.length;j++){
    const vA=G.curBoard.get(free[i]),vB=G.curBoard.get(free[j]);
    if(G.mode==='classic'?vA===vB:vA+vB===10)return true;
  }
  return false;
}
function removePair(pA,pB){
  G.occ.delete(pA);G.occ.delete(pB);
  G.curBoard.delete(pA);G.curBoard.delete(pB);
  G.pairs++;
}

function onTileClick(pos){
  if(G.won||G.noMoves||G.solving||G.timedOut)return;
  const d=dec(pos);
  if(!isFree(d.x,d.y,d.z,G.occ))return;

  if(G.sel===null){G.sel=pos;}
  else if(G.sel===pos){G.sel=null;}
  else{
    const vA=G.curBoard.get(G.sel),vB=G.curBoard.get(pos);
    const match=G.mode==='classic'?vA===vB:vA+vB===10;
    if(match){
      removePair(G.sel,pos);G.sel=null;
      if(G.occ.size===0){
        G.won=true;
        clearInterval(G.timerHandle);G.timerHandle=null;
        setTimeout(levelComplete,500);
      } else if(!hasValidPair()){
        G.noMoves=true;
        if(G.shufflesLeft>0){
          msg(`No pairs left — use Shuffle (${G.shufflesLeft===Infinity?'∞':G.shufflesLeft} left).`,'warn-c');
        } else {
          msg('No valid pairs and no shuffles left — press New Game to retry.','err');
        }
      } else {
        msg(`${G.mode==='math'?`${vA} + ${vB} = 10`:`${vA} = ${vA} ✓`}`,'ok');
      }
    } else {
      msg(`${G.mode==='math'?`${vA} + ${vB} ≠ 10`:`${vA} ≠ ${vB}`} — try again`,'warn-c');
      G.sel=pos;
    }
  }
  render();updateStats();
}

function doShuffle(){
  if(G.timedOut||G.won)return;
  if(G.shufflesLeft===0){msg('No shuffles remaining!','err');return;}
  if(G.shufflesLeft!==Infinity)G.shufflesLeft--;
  // New random seed, same level config (shuffles already decremented — newGame won't reset)
  const newSeed=Math.floor(Math.random()*999999);
  document.getElementById('si').value=newSeed;
  G.noMoves=false;
  newGame();
}

// ─────────────────────────────────────────────────
// 14. Auto-solve (reviewer fix: clears timer, uses G.solving guard)
// ─────────────────────────────────────────────────
async function autoSolve(){
  if(G.solving||G.won||G.timedOut)return;
  if(!G.verified){msg('Cannot auto-solve: solution not verified','err');return;}
  G.solving=true;G.sel=null;
  // Pause timer during auto-solve (reviewer: avoid setInterval/async race)
  clearInterval(G.timerHandle);G.timerHandle=null;
  msg('Auto-solving…','warn-c');
  for(const[pA,pB]of G.solution){
    if(!G.solving)break; // newGame() sets solving=false → clean exit
    if(!G.occ.has(pA)||!G.occ.has(pB))continue;
    G.sel=pA;render();updateStats();
    await sleep(90);
    removePair(pA,pB);G.sel=null;render();updateStats();
    await sleep(90);
  }
  G.solving=false;
  if(G.occ.size===0){
    G.won=true;
    setTimeout(levelComplete,500);
  } else {
    msg('Auto-solve finished (some pairs already removed manually)','ok');
  }
  render();updateStats();
}
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}

// ─────────────────────────────────────────────────
// 15. Canvas rendering
// ─────────────────────────────────────────────────
function resize(){
  const{mx,my,mz}=maxXYZ(G.slots);
  cv.width =PAD*2+(mx+1)*TS+mz*ZDX+3;
  cv.height=PAD*2+(my+1)*TS+mz*ZDY+3;
}
function render(){
  ctx.clearRect(0,0,cv.width,cv.height);
  ctx.fillStyle='#0a0518';ctx.fillRect(0,0,cv.width,cv.height);
  const{mz}=maxXYZ(G.slots);
  const free=freeTiles();
  // Compute matchable set only when needed (partial highlight)
  const matchable=G.highlightMode==='partial'
    ?matchableTiles(free,G.curBoard,G.mode):null;

  const vis=[...G.slots].filter(p=>G.occ.has(p));
  vis.sort((a,b)=>{
    const za=dec(a).z,zb=dec(b).z;
    if(za!==zb)return za-zb;
    return dec(a).y-dec(b).y;
  });
  for(const p of vis){
    const{x,y,z}=dec(p);
    const{sx,sy}=tsp(x,y,z,mz);
    const val=G.curBoard.get(p);
    let st;
    if(p===G.sel)               st='sel';
    else if(G.highlightMode==='none')   st='blocked';
    else if(G.highlightMode==='partial')st=(matchable&&matchable.has(p))?'free':'blocked';
    else                        st=free.has(p)?'free':'blocked';
    drawTile(ctx,sx,sy,val,st);
  }
}
cv.addEventListener('click',e=>{
  const rect=cv.getBoundingClientRect();
  const cx=e.clientX-rect.left,cy=e.clientY-rect.top;
  const{mz}=maxXYZ(G.slots);
  const vis=[...G.slots].filter(p=>G.occ.has(p));
  vis.sort((a,b)=>dec(b).z-dec(a).z); // highest z first for hit test
  for(const p of vis){
    const{x,y,z}=dec(p);
    const{sx,sy}=tsp(x,y,z,mz);
    if(cx>=sx&&cx<sx+TS-2&&cy>=sy&&cy<sy+TS-2){onTileClick(p);return;}
  }
});

function updateStats(){
  document.getElementById('sRem').textContent=G.occ.size;
  document.getElementById('sPairs').textContent=G.pairs;
  document.getElementById('sFree').textContent=freeTiles().size;
  document.getElementById('sSh').textContent=G.shufflesLeft===Infinity?'∞':G.shufflesLeft;
  if(G.timeRemaining>0){
    const el=document.getElementById('sTime');
    el.textContent=fmtTime(G.timeRemaining);
    el.className='sv'+(G.timeRemaining<=30?' crit':G.timeRemaining<=60?' warn':'');
  }
}
function msg(txt,cls){
  const el=document.getElementById('msg');
  el.textContent=txt;el.className=cls||'ok';
}
function buildLegend(){
  const leg=document.getElementById('leg');leg.innerHTML='';
  const items=G.mode==='classic'
    ?[1,2,3,4,5,6,7,8,9].map(v=>[v,`${v}`])
    :[[1,'1+9'],[2,'2+8'],[3,'3+7'],[4,'4+6'],[5,'5+5']];
  for(const[v,label]of items){
    const d=document.createElement('div');
    d.className='li';
    d.innerHTML=`<div class="ld" style="background:${VCOL[v]}"></div><span>${label}</span>`;
    leg.appendChild(d);
  }
}

// Init
// ─────────────────────────────────────────────────
window.onload=()=>loadLevel(1);
</script>
